<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 88 80" width="88" height="80">
  <defs>
    <linearGradient id="g" x1="10" y1="10" x2="78" y2="70" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#1d4ed8"/>
      <stop offset="100%" stop-color="#60a5fa"/>
    </linearGradient>
  </defs>

  <!-- Top bar — right side cortado em diagonal (lightning cut) -->
